/**:
  ros__parameters:
    # General controller parameters
    vehicle_frame_id: "base_link"
    fixed_over_time_frame_id: "map"
    control_frequency: 50.0 # [Hz]
    vehicle_state_timeout: 0.2 # [s]
    lateral_lookahed_time: 0.1 # [s]
    longitudinal_lookahed_time: 0.1 # [s]

    # Inverse single track parameters
    wheelbase: 3.124 # [m]
    # l_v: 1.58744   # [m] front offset to center of gravity
    # l_h: 1.53656   # [m] rear offset to center of gravity
    # m: 2395.0      # [kg] vehicle mass
    # c_sv: 130000   # [N/rad] Cornering stiffness front (from passat)
    # c_sh: 190000   # [N/rad] Cornering stiffness rear (from passat)
    # EG = m / wheelbase * (l_h * c_sh - l_v * c_sv) / (c_sv * c_sh) # self-steering gradient
    selfsteergradient: 0.002656230515

    # Control value constraints
    max_longitudinal_acceleration: 2.0 # [m/s^2]
    min_longitudinal_acceleration: -4.5 # [m/s^2]
    max_longitudinal_jerk: 4.0 # [m/s^3]
    use_speed_dependent_lateral_limits: true
    lateral_limits_csv: "config/example-limits.csv" # path to csv file with speed dependent lateral limits; if use_speed_dependent_lateral_limits is true
    max_curvature: 0.1933268013 # [1/m]; if use_speed_dependent_lateral_limits is false
    max_curvature_rate: 0.1676052419 # [1/(m*s)]; if use_speed_dependent_lateral_limits is false
    max_curvature_acceleration: 0.7262893814 # [1/(m*s^2)]
    anti_windup_gain: 1.0 # [1/s]
    use_back_calculation: false

    # Gain scheduling Look-Up-Tables
    velocity_lookup: # [m/s]
      - -2.78
      - -0.2
      -  0.0
      -  0.2
      -  2.78
      - 11.11
      - 16.67
      - 22.22
      - 27.78
      - 33.33
      - 38.89
    feed_forward_acceleration_gain:
      - 0.0 # value for -2.78 m/s
      - 0.0 # value for -0.2 m/s
      - 1.0 # value for  0.0 m/s
      - 1.0 # value for  0.2 m/s
      - 1.0 # value for  2.78 m/s
      - 1.0 # value for 11.11 m/s
      - 1.0 # value for 16.67 m/s
