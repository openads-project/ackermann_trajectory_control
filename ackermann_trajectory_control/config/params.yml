/**:
  ros__parameters:
    # General controller parameters
    vehicle_frame_id: "base_link"
    fixed_over_time_frame_id: "map"
    control_frequency: 50.0 # [Hz]
    vehicle_state_timeout: 0.2 # [s]
    lateral_lookahead_time: 0.1 # [s]
    longitudinal_lookahead_time: 0.1 # [s]

    # Inverse single track model parameters
    wheelbase: 3.1 # [m]
    selfsteergradient: 0.00265 # [s^2/m]

    # Control value constraints
    max_longitudinal_acceleration: 2.0 # [m/s^2]
    min_longitudinal_acceleration: -4.5 # [m/s^2]
    max_longitudinal_jerk: 4.0 # [m/s^3]
    use_speed_dependent_lateral_limits: true
    lateral_limits_csv: "config/example-limits.csv" # Path to the CSV file with speed-dependent lateral limits if use_speed_dependent_lateral_limits is true
    max_curvature: 0.2 # [1/m]; if use_speed_dependent_lateral_limits is false
    max_curvature_rate: 0.2 # [1/(m*s)]; if use_speed_dependent_lateral_limits is false
    max_curvature_acceleration: 0.75 # [1/(m*s^2)]
    anti_windup_gain: 1.0 # [1/s]
    use_back_calculation: false
    use_odom: true

    # Gain scheduling lookup tables
    velocity_lookup: # [m/s]
      - -2.78
      - -0.2
      -  0.0
      -  0.2
      -  2.78
      - 13.89
      - 27.78
    feed_forward_acceleration_gain:
      - 0.0 # value for -2.78 m/s
      - 0.0 # value for -0.2 m/s
      - 1.0 # value for  0.0 m/s
      - 1.0 # value for  0.2 m/s
      - 1.0 # value for  2.78 m/s
      - 1.0 # value for 13.89 m/s
      - 1.0 # value for 27.78 m/s
    feed_forward_steering_angle_gain:
      - 0.0 # value for -2.78 m/s
      - 0.0 # value for -0.2 m/s
      - 1.0 # value for  0.0 m/s
      - 1.0 # value for  0.2 m/s
      - 1.0 # value for  2.78 m/s
      - 1.0 # value for 13.89 m/s
      - 1.0 # value for 27.78 m/s
    # Velocity controller parameters
    dv_p:
      - 1.0 # value for -2.78 m/s
      - 1.0 # value for -0.2 m/s
      - 1.0 # value for  0.0 m/s
      - 1.0 # value for  0.2 m/s
      - 1.0 # value for  2.78 m/s
      - 1.0 # value for 13.89 m/s
      - 1.0 # value for 27.78 m/s
    dv_i:
      - 0.0 # value for -2.78 m/s
      - 0.0 # value for -0.2 m/s
      - 0.0 # value for  0.0 m/s
      - 0.0 # value for  0.2 m/s
      - 0.0 # value for  2.78 m/s
      - 0.0 # value for 13.89 m/s
      - 0.0 # value for 27.78 m/s
    dv_d:
      - 0.0 # value for -2.78 m/s
      - 0.0 # value for -0.2 m/s
      - 0.0 # value for  0.0 m/s
      - 0.0 # value for  0.2 m/s
      - 0.0 # value for  2.78 m/s
      - 0.0 # value for 13.89 m/s
      - 0.0 # value for 27.78 m/s
    # Lateral deviation controller parameters
    dy_p:
      - 0.1   # value for -2.78 m/s
      - 0.1   # value for -0.2 m/s
      - 0.1   # value for  0.0 m/s
      - 0.1   # value for  0.2 m/s
      - 0.1   # value for  2.78 m/s
      - 0.05  # value for 13.89 m/s
      - 0.025 # value for 27.78 m/s
    dy_i:
      - 0.004  # value for -2.78 m/s
      - 0.0    # value for -0.2 m/s
      - 0.0    # value for  0.0 m/s
      - 0.0    # value for  0.2 m/s
      - 0.002  # value for  2.78 m/s
      - 0.004  # value for 13.89 m/s
      - 0.001  # value for 27.78 m/s
    dy_d:
      - 0.04  # value for -2.78 m/s
      - 0.0   # value for -0.2 m/s
      - 0.0   # value for  0.0 m/s
      - 0.0   # value for  0.2 m/s
      - 0.04  # value for  2.78 m/s
      - 0.02  # value for 13.89 m/s
      - 0.015 # value for 27.78 m/s
    # heading deviation controller parameters
    dpsi_p:
      - 1.0 # value for -2.78 m/s
      - 0.0 # value for -0.2 m/s
      - 0.0 # value for  0.0 m/s
      - 0.0 # value for  0.2 m/s
      - 1.0 # value for  2.78 m/s
      - 1.0 # value for 13.89 m/s
      - 1.0 # value for 27.78 m/s
    dpsi_i:
      - 1.2  # value for -2.78 m/s
      - 0.0  # value for -0.2 m/s
      - 0.0  # value for  0.0 m/s
      - 0.0  # value for  0.2 m/s
      - 1.2  # value for  2.78 m/s
      - 0.5  # value for 13.89 m/s
      - 0.13 # value for 27.78 m/s
    dpsi_d:
      - 0.0 # value for -2.78 m/s
      - 0.0 # value for -0.2 m/s
      - 0.0 # value for  0.0 m/s
      - 0.0 # value for  0.2 m/s
      - 0.0 # value for  2.78 m/s
      - 0.0 # value for 13.89 m/s
      - 0.0 # value for 27.78 m/s
