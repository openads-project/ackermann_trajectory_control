services:

  ackermann-trajectory-control:
    image: ghcr.io/openads-project/ackermann_trajectory_control:v1.4.0
    environment:
      # --- name ------
      NAMESPACE: /
      NAME: ackermann_trajectory_control
      # --- inputs ----
      EGO_DATA_TOPIC: ~/ego_data
      TRAJECTORY_TOPIC: ~/trajectory
      LAT_CONTROL_ACTIVE_TOPIC: ~/lat_control_active
      LON_CONTROL_ACTIVE_TOPIC: ~/lon_control_active
      # --- outputs ---
      CONTROLS_TOPIC: ~/controls
      # --- other -----
      LOG_LEVEL: ${LOG_LEVEL:-info}
      USE_SIM_TIME: ${USE_SIM_TIME:-false}
      PARAMS: ${PARAMS:-/docker-ros/ws/install/ackermann_trajectory_control/share/ackermann_trajectory_control/config/params.yml}
      TRACE: ${TRACE:-False}
    command:
      - /bin/bash
      - -ic
      - |
        ros2 launch ackermann_trajectory_control ackermann_trajectory_control.launch.py \
          namespace:=$${NAMESPACE} \
          name:=$${NAME} \
          log_level:=$${LOG_LEVEL} \
          use_sim_time:=$${USE_SIM_TIME} \
          params:=$${PARAMS} \
          trace:=$${TRACE} \
          ego_data_topic:=$${EGO_DATA_TOPIC} \
          trajectory_topic:=$${TRAJECTORY_TOPIC} \
          lat_control_active_topic:=$${LAT_CONTROL_ACTIVE_TOPIC} \
          lon_control_active_topic:=$${LON_CONTROL_ACTIVE_TOPIC} \
          controls_topic:=$${CONTROLS_TOPIC}
    # volumes:
    #   - ./params.yml:/docker-ros/ws/install/ackermann_trajectory_control/share/ackermann_trajectory_control/config/params.yml
